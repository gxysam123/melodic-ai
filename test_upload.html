<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API上传测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0F0F23;
            color: #F8FAFC;
        }
        .container {
            background: #171733;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #4338CA;
        }
        h1 {
            color: #4338CA;
        }
        input[type="file"] {
            display: block;
            margin: 20px 0;
            padding: 10px;
            background: #0F0F23;
            border: 2px solid #4338CA;
            border-radius: 5px;
            color: #F8FAFC;
        }
        button {
            background: linear-gradient(to right, #4338CA, #312E81);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            filter: brightness(1.2);
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #0F0F23;
            border-radius: 5px;
            border: 1px solid #334155;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 妙音AI - API上传测试</h1>
        <p>测试后端上传API是否正常工作</p>

        <input type="file" id="fileInput" accept="audio/*,video/*">
        <button onclick="uploadFile()">上传测试</button>

        <div id="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');

            if (!fileInput.files || fileInput.files.length === 0) {
                resultDiv.innerHTML = '<span class="error">❌ 请先选择一个文件</span>';
                return;
            }

            const file = fileInput.files[0];
            resultDiv.innerHTML = '<span>⏳ 正在上传...</span>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✅ 上传成功！</span>\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 上传失败</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 网络错误</span>\n\n${error.message}\n\n请确保后端服务器在运行：\npython3 backend_server.py`;
            }
        }

        // 测试健康检查
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                console.log('✅ 后端状态:', data);
            } catch (error) {
                console.error('❌ 后端连接失败:', error);
            }
        }

        // 页面加载时检查
        checkHealth();
    </script>
</body>
</html>
